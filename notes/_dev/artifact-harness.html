<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8" /><title>Artifact host harness</title>
<style>body{font-family:system-ui;margin:24px} iframe{width:420px;border:1px solid #ccc;display:block}</style></head>
<body>
  <h1>Artifact host harness</h1>
  <p>Open the console. The iframe below should show a working counter (proves JSX transform + esm.sh React + mount).</p>
  <iframe id="f" src="/notes/artifact-host.html" sandbox="allow-scripts"></iframe>
  <script>
    var f = document.getElementById("f");
    var id = "harness-1";
    var payload = {
      source: "note", type: "artifact:init", id: id, theme: "light", css: [], modules: {}, libImports: {},
      code: "export default function App(){const [n,setN]=React.useState(0);return <button onClick={()=>setN(n+1)}>count {n}</button>;}"
    };
    window.addEventListener("message", function (e) {
      var d = e.data || {};
      if (e.source !== f.contentWindow) return;
      console.log("msg:", d.type, d);
      if (d.type === "artifact:hostready") f.contentWindow.postMessage(payload, "*");
      if (d.type === "artifact:height") f.style.height = d.px + "px";
      if (d.type === "artifact:error") console.error("ARTIFACT ERROR:", d.message);
    });
  </script>
</body>
</html>
